<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Partner ID Generator | IntSup</title>
  <meta name="description" content="Generate a deterministic partner ID from first and last name." />
  <style>
    :root {
      --navy:#07384a;
      --navy2:#062d3b;
      --paper:#fbfaf7;
      --card:#ffffff;
      --text:#172126;
      --muted:#748188;
      --line:#e8dfd0;
      --gold:#c9a45c;
      --green:#20a86b;
      --shadow:0 24px 70px rgba(7,56,74,.14);
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 10% -10%,rgba(201,164,92,.16),transparent 30%),radial-gradient(circle at 100% 0%,rgba(7,56,74,.13),transparent 34%),var(--paper)}
    main{width:min(560px,100%);background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}
    header{padding:30px 30px 24px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff}
    .kicker{margin:0 0 10px;font-size:12px;font-weight:850;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.64)}
    h1{margin:0;font-family:Georgia,'Times New Roman',serif;font-size:clamp(34px,7vw,48px);line-height:1;letter-spacing:-.03em}
    .subtitle{margin:14px 0 0;color:rgba(255,255,255,.74);font-size:14px;line-height:1.55;font-weight:650}
    form{display:grid;gap:16px;padding:28px 30px 30px}
    label{display:grid;gap:8px;font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--navy)}
    input{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px 15px;color:var(--text);font:inherit;font-size:16px;outline:none;transition:.2s}
    input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(201,164,92,.16)}
    button{border:0;border-radius:999px;padding:14px 18px;font:inherit;font-size:14px;font-weight:950;cursor:pointer;transition:.2s}
    button:hover{transform:translateY(-1px)}
    .primary{margin-top:4px;background:var(--navy);color:#fff;box-shadow:0 12px 28px rgba(7,56,74,.18)}
    .result{display:none;margin-top:6px;padding:18px;border-radius:20px;background:#f8f5ef;border:1px solid var(--line)}
    .result.show{display:block}
    .resultLabel{margin:0 0 8px;color:var(--muted);font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}
    .resultRow{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .idText{font-size:30px;font-weight:950;color:var(--navy);letter-spacing:.04em;overflow-wrap:anywhere}
    .copy{flex:0 0 auto;background:#fff;color:var(--navy);border:1px solid var(--line);padding:11px 14px}
    .status{min-height:18px;margin:10px 0 0;color:var(--green);font-size:12px;font-weight:900}
    .error{min-height:18px;margin:0;color:#b4232a;font-size:13px;font-weight:800}
    @media(max-width:520px){
      body{padding:14px}
      main{border-radius:22px}
      header,form{padding-left:20px;padding-right:20px}
      .resultRow{align-items:stretch;flex-direction:column}
      .copy{width:100%}
      .idText{font-size:26px}
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="kicker">IntSup ISP</p>
      <h1>Partner ID Generator</h1>
      <p class="subtitle">Enter the partner name and generate a stable ID. The same name always returns the same ID.</p>
    </header>

    <form id="partnerForm" autocomplete="off">
      <label>
        First Name
        <input id="firstName" name="firstName" type="text" placeholder="First name" required />
      </label>
      <label>
        Last Name
        <input id="lastName" name="lastName" type="text" placeholder="Last name" required />
      </label>

      <p class="error" id="errorText" role="alert"></p>
      <button class="primary" type="submit">Generate My Partner ID</button>

      <section class="result" id="resultPanel" aria-live="polite">
        <p class="resultLabel">Generated Partner ID</p>
        <div class="resultRow">
          <strong class="idText" id="partnerId">--</strong>
          <button class="copy" id="copyButton" type="button">Copy</button>
        </div>
        <p class="status" id="copyStatus"></p>
      </section>
    </form>
  </main>

  <script>
    const SECRET_KEY = 'IntSup-ISP-Partner-ID-v1-2026';

    const form = document.getElementById('partnerForm');
    const firstName = document.getElementById('firstName');
    const lastName = document.getElementById('lastName');
    const errorText = document.getElementById('errorText');
    const resultPanel = document.getElementById('resultPanel');
    const partnerId = document.getElementById('partnerId');
    const copyButton = document.getElementById('copyButton');
    const copyStatus = document.getElementById('copyStatus');

    function normalizeName(value) {
      return value.trim().replace(/\s+/g, ' ').toLowerCase();
    }

    function getInitial(value) {
      const normalized = normalizeName(value);
      return normalized ? normalized[0].toUpperCase() : '';
    }

    async function createPartnerId(first, last) {
      const encoder = new TextEncoder();
      const payload = `${normalizeName(first)}|${normalizeName(last)}`;
      const key = await crypto.subtle.importKey(
        'raw',
        encoder.encode(SECRET_KEY),
        { name: 'HMAC', hash: 'SHA-256' },
        false,
        ['sign']
      );
      const signature = new Uint8Array(await crypto.subtle.sign('HMAC', key, encoder.encode(payload)));
      let value = 0n;
      for (const byte of signature.slice(0, 8)) value = (value << 8n) + BigInt(byte);
      const digits = String(value % 10000000n).padStart(7, '0');
      return `${getInitial(first)}${getInitial(last)}${digits}`;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorText.textContent = '';
      copyStatus.textContent = '';

      if (!normalizeName(firstName.value) || !normalizeName(lastName.value)) {
        errorText.textContent = 'Please enter both first name and last name.';
        resultPanel.classList.remove('show');
        return;
      }

      partnerId.textContent = await createPartnerId(firstName.value, lastName.value);
      resultPanel.classList.add('show');
    });

    copyButton.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(partnerId.textContent);
        copyStatus.textContent = 'Copied to clipboard';
        setTimeout(() => copyStatus.textContent = '', 1800);
      } catch (error) {
        copyStatus.textContent = 'Copy not available on this browser';
        setTimeout(() => copyStatus.textContent = '', 2200);
      }
    });
  </script>
</body>
</html>
